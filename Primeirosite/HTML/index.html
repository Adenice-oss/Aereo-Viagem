<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aereo Viagem</title>
  <link rel="stylesheet" href="../CSS/index.css">
</head>
<body>
  
  
  <!-- Cabeçalho -->
  <header>
    <img src="../imagens/logo.png" alt="Logo Aereo Viagem" class="logo">
    <h1 class="nome-agencia">Aereo Viagem</h1>
  </header>

  <!-- Imagem de Fundo -->
  <section class="banner">
    <div class="form-container">
      <<section class="formulario-container">
        <form class="formulario">
          <div class="form-header">
            <img src="../imagens/icone aviao.png" alt="Ícone Avião" class="icone-aviao">
            <h2>Solicite um Orçamento</h2>
          </div>
      
          <p>Informe seus dados</p>
      
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Nome completo" required>
      
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="E-mail para contato" required>
      
          <label for="celular">Celular</label>
          <input type="tel" id="celular" placeholder="(xx) xxxxx-xxxx" required>
      
          <div class="data-group">
            <div>
              <label for="ida">Data de Ida</label>
              <input type="date" id="ida" required>
            </div>
            <div>
              <label for="volta">Data de Volta</label>
              <input type="date" id="volta" required>
            </div>
          </div>
      
          <label for="origem">Origem</label>
          <select id="origem">
            <option>Partindo de</option>
            <option>São Paulo</option>
            <option>Rio de Janeiro</option>
          </select>
      
          <label for="destino">Destino</label>
          <select id="destino">
            <option>Indo para</option>
            <option>Nova York</option>
            <option>Paris</option>
          </select>
      
          <label>Quarto com cama infantil?</label>
          <div class="radio-group">
            <input type="radio" id="infantil-sim" name="cama-infantil" value="sim">
            <label for="infantil-sim">Sim</label>
            <input type="radio" id="infantil-nao" name="cama-infantil" value="nao">
            <label for="infantil-nao">Não</label>
          </div>
      
          <label>Preferências da Hospedagem</label>
          <div class="checkbox-group">
            <input type="checkbox" id="piscina">
            <label for="piscina">Piscina</label>
            <input type="checkbox" id="wifi">
            <label for="wifi">WI-FI</label>
            <input type="checkbox" id="garagem">
            <label for="garagem">Garagem</label>
            <input type="checkbox" id="suite">
            <label for="suite">Suíte</label>
          </div>
      
          <button type="submit" class="botao-submit">Solicitar dados</button>
        </form>
      </section>
      
      </form>
    </div>
  </section>

 <!-- Promoções de Cidades -->
 <section class="promocoes">
  <h2>Promoções Imperdíveis</h2>
  <div class="cidades">
      <div class="cidade">
          <img src="../imagens/manaus.jpg" alt="Promoção Manaus" class="imagem-cortada">
          <p>Manaus - Desconto de até 50%</p>
      </div>
      <div class="cidade">
          <img src="../imagens/campos do jordao.jpg" alt="Promoção Campos do Jordão" class="imagem-cortada">
          <p>Campos do Jordão - Desconto de até 30%</p>
      </div>
      <div class="cidade">
          <img src="../imagens/belem do para.jpg" alt="Promoção Belém do Pará" class="imagem-cortada">
          <p>Belém do Pará - Desconto de até 20%</p>
      </div>
  </div>
</section>



  </section>
    <footer>
