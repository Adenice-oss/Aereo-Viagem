<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aereo Viagem - Agência de Viagens</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css"> <!-- Link para o CSS -->
</head>
<body>

    <!-- Cabeçalho -->
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Aereo Viagem</a>
        </div>
    </header>

    <!-- Imagem de fundo -->
    <section class="hero">
        <div class="container text-center text-white">
            <h1>Viaje com a Aereo Viagem</h1>
            <p>Explore o mundo com promoções exclusivas</p>
        </div>
    </section>

    <!-- Formulário de Orçamento -->
    <section class="formulario">
        <div class="container">
            <h2>Solicite um Orçamento</h2>
            <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label for="destino">Destino</label>
                    <input type="text" class="form-control" id="destino" placeholder="Para onde deseja viajar?">
                </div>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </div>
    </section>

    <!-- Rodapé -->
    <footer class="bg-primary text-white text-center p-3">
        <p>&copy; 2025 Aereo Viagem - Todos os direitos reservados.</p>
        <p>Conecte-se com a gente nas redes sociais!</p>
        <div>
            <!-- Links para redes sociais -->
            <a href="#" class="text-white">Facebook</a> |
            <a href="#" class="text-white">Instagram</a> |
            <a href="#" class="text-white">Twitter</a>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
