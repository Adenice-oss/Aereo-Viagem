<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aereo Viagem</title>
  <link rel="stylesheet" href="../CSS/index.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <img src="../imagens/logo.png" alt="Logo Aereo Viagem" class="logo">
  </header>

  <!-- Imagem de Fundo -->
  <section class="banner">
    <div class="form-container">
      <h2>Solicite seu Orçamento</h2>
      <form action="#" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="cidade">Cidade Destino:</label>
        <input type="text" id="cidade" name="cidade" required>

        <button type="submit" class="submit-btn">
          <img src="../imagens/aviao-icon.png" alt="Ícone de Avião"> Enviar
        </button>
      </form>
    </div>
  </section>

  <!-- Promoções de Cidades -->
  <section class="promocoes">
    <h2>Promoções Imperdíveis</h2>
    <div class="cidade">
      <img src="../imagens/cidade1.jpg" alt="Promoção Cidade 1">
      <p>Cidade 1 - Desconto de até 50%</p>
    </div>
    <div class="cidade">
      <img src="../imagens/cidade2.jpg" alt="Promoção Cidade 2">
      <p>Cidade 2 - Desconto de até 30%</p>
    </div>
    <div class="cidade">
      <img src="../imagens/cidade3.jpg" alt="Promoção Cidade 3">
      <p>Cidade 3 - Desconto de até 20%</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="contato">
      <p>Contato: contato@aereoviagem.com.br</p>
      <p>Redes Sociais:</p>
      <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
    </div>
  </footer>
  <footer>
    <div class="contato">
      <p>Contato: contato@aereoviagem.com.br</p>
      <p>Redes Sociais:</p>
      <a href="#" class="social-icon"><img src="../imagens/facebook-icon.png" alt="Facebook"></a>
      <a href="#" class="social-icon"><img src="../imagens/instagram-icon.png" alt="Instagram"></a>
      <a href="#" class="social-icon"><img src="../imagens/twitter-icon.png" alt="Twitter"></a>
    </div>
  </footer>
  
</body>
</html>
